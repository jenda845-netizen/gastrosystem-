<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gastro POS | Samsung S23+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .grid-tables { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .grid-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-xl flex flex-col">
        
        <header class="bg-slate-900 text-white p-4 shadow-lg flex justify-between items-center">
            <div>
                <h1 class="font-black text-xl tracking-tighter uppercase">Moje Restaurace</h1>
                <p class="text-[10px] text-green-400 font-bold uppercase tracking-widest">Tisk přes RawBT OK</p>
            </div>
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(34,197,94,0.8)]"></div>
        </header>

        <div id="section-tables" class="p-4">
            <h2 class="text-gray-400 font-bold mb-3 uppercase text-[10px] tracking-widest">Aktivní stoly</h2>
            <div class="grid-tables" id="table-grid"></div>
        </div>

        <div id="section-pos" class="hidden flex-1 flex flex-col p-4 bg-gray-50">
            <div class="flex justify-between items-center mb-4">
                <button onclick="showTables()" class="bg-gray-200 text-slate-700 px-3 py-1 rounded-lg font-bold text-xs uppercase tracking-tight shadow-sm active:bg-gray-300">← Zpět</button>
                <span id="label-table" class="bg-slate-900 text-white px-6 py-2 rounded-xl font-black shadow-md uppercase tracking-widest">STŮL</span>
            </div>

            <div class="flex-1 overflow-y-auto pr-1">
                <div class="grid-menu mb-6" id="menu-grid"></div>
                <h3 class="font-bold border-b-2 border-slate-200 pb-1 mb-2 text-[10px] text-gray-400 uppercase tracking-wider">Položky k tisku</h3>
                <div id="cart-list" class="space-y-2 text-sm font-medium"></div>
            </div>

            <div class="pt-4 mt-2 border-t-2 border-dashed border-gray-300">
                <div class="flex justify-between items-center mb-4 px-1">
                    <span class="text-gray-400 font-bold text-[10px] uppercase tracking-widest">Celkem</span>
                    <span class="text-3xl font-black text-slate-900"><span id="total-price">0</span> Kč</span>
                </div>
                <button onclick="printWithRawBT()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-blue-200 shadow-xl active:bg-blue-700 active:scale-[0.98] transition-all uppercase tracking-tight">
                    ZAPLATIT A TISKNOUT
                </button>
            </div>
        </div>
    </div>

    <script>
        const menu = [
            { name: "Pivo 11°", price: 45 },
            { name: "Pivo 12°", price: 52 },
            { name: "Kofola 0.5", price: 38 },
            { name: "Gulášovku", price: 65 },
            { name: "Smažák", price: 185 },
            { name: "Guláš", price: 175 },
            { name: "Espresso", price: 48 },
            { name: "Turecká káva", price: 35 }
        ];

        let cart = [];
        let activeTable = null;

        // Kreslení stolů
        const tableGrid = document.getElementById('table-grid');
        for(let i=1; i<=12; i++) {
            const btn = document.createElement('div');
            btn.className = "bg-white border border-gray-200 h-16 flex items-center justify-center rounded-2xl font-black text-slate-800 shadow-sm active:bg-blue-600 active:text-white active:scale-95 transition-all cursor-pointer";
            btn.innerText = i;
            btn.onclick = () => openTable(i);
            tableGrid.appendChild(btn);
        }

        // Kreslení menu
        const menuGrid = document.getElementById('menu-grid');
        menu.forEach(item => {
            const btn = document.createElement('div');
            btn.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center active:bg-blue-50 active:scale-95 transition-all";
            btn.innerHTML = `<span class="text-[11px] font-bold text-gray-400 uppercase mb-1">${item.name}</span><span class="text-slate-900 font-black text-lg">${item.price} Kč</span>`;
            btn.onclick = () => { cart.push(item); updateUI(); };
            menuGrid.appendChild(btn);
        });

        function openTable(n) {
            activeTable = n;
            document.getElementById('label-table').innerText = "STŮL " + n;
            document.getElementById('section-tables').classList.add('hidden');
            document.getElementById('section-pos').classList.remove('hidden');
        }

        function showTables() {
            document.getElementById('section-tables').classList.remove('hidden');
            document.getElementById('section-pos').classList.add('hidden');
            cart = []; updateUI();
        }

        function updateUI() {
            const list = document.getElementById('cart-list');
            const total = document.getElementById('total-price');
            list.innerHTML = cart.length === 0 ? '<p class="text-gray-300 italic text-center py-4">Košík je prázdný</p>' : 
                cart.map(i => `<div class="flex justify-between border-b border-gray-100 pb-1 italic"><span>${i.name}</span><span class="font-bold text-blue-600">${i.price} Kč</span></div>`).join('');
            total.innerText = cart.reduce((s, i) => s + i.price, 0);
        }

        function removeAccents(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function printWithRawBT() {
            if (cart.length === 0) return;

            const now = new Date().toLocaleString('cs-CZ');
            const total = document.getElementById('total-price').innerText;

            // Příprava ESC/POS textu
            let text = "\x1B\x40"; // Reset tiskárny
            text += "\x1B\x61\x01"; // Vycentrování
            text += "MOJE RESTAURACE\n";
            text += "--------------------------------\n";
            text += "STUL: " + activeTable + " | " + now + "\n";
            text += "--------------------------------\n";
            text += "\x1B\x61\x00"; // Zarovnání vlevo

            cart.forEach(item => {
                let name = removeAccents(item.name).substring(0, 20);
                text += name.padEnd(22) + item.price.toString().padStart(4) + " Kc\n";
            });

            text += "--------------------------------\n";
            text += "\x1B\x61\x01"; // Vycentrování
            text += "\x1B\x21\x10"; // Dvojitá výška textu
            text += "CELKEM: " + total + " Kc\n";
            text += "\x1B\x21\x00"; // Normální výška
            text += "--------------------------------\n";
            text += "DEKUJEME ZA NAVSTEVU!\n\n\n\n\n";

            // Převod na Base64
            const base64Data = btoa(text);

            // Intent příkaz pro Samsung - otevře RawBT a rovnou tiskne
            const intentUrl = "intent:#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;S.base64=" + base64Data + ";end;";
            
            // Provedení akce
            window.location.href = intentUrl;
            
            // Po krátké prodlevě vyčistit stůl a vrátit se
            setTimeout(() => {
                showTables();
            }, 1500);
        }
    </script>
</body>
</html>
