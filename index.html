<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GASTRO PRO - Elite Edition</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --success: #22c55e; --warn: #f59e0b; --danger: #ef4444; --text: #f8fafc; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); user-select: none; }
        header { background: var(--card); padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; sticky: top; }
        .screen { padding: 15px; }
        .hidden { display: none !important; }
        
        /* Mapa stolů */
        #tables-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .table-box { height: 95px; background: var(--card); border-radius: 12px; border: 2px solid #475569; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .table-box.occupied { border-color: var(--danger); background: #450a0a; }
        .table-box.reserved { border-color: var(--warn); background: #422006; }
        .table-box small { font-size: 10px; margin-top: 5px; opacity: 0.8; }

        /* Dělení účtu a Seznamy */
        .split-item { display: flex; justify-content: space-between; padding: 12px; margin-bottom: 5px; background: #f1f5f9; color: #000; border-radius: 8px; font-weight: bold; }
        .split-item.selected { background: var(--success); color: white; }

        /* UI Prvky */
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: bold; color: white; width: 100%; margin-top: 10px; font-size: 14px; }
        .btn-pay { background: var(--success); }
        .btn-split { background: var(--accent); }
        .btn-res { background: var(--warn); }
        .btn-back { background: #475569; }
        
        /* Modaly */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal-content { background: white; color: black; padding: 20px; border-radius: 20px; width: 90%; max-height: 80vh; overflow-y: auto; }
        input[type="datetime-local"] { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .m-item { background: var(--card); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 13px; }
    </style>
</head>
<body>

    <header>
        <h1 onclick="location.reload()">GASTRO PRO 2026</h1>
        <button onclick="showAdmin()" style="background:#475569; color:white; border:none; padding:8px 15px; border-radius:8px;">MANAŽER</button>
    </header>

    <div id="screen-tables" class="screen">
        <div id="tables-grid"></div>
    </div>

    <div id="screen-order" class="screen hidden">
        <h2 id="active-table-name">Stůl</h2>
        <div class="menu-grid" id="menu-box"></div>
        <div style="background:white; color:black; padding:15px; border-radius:10px;">
            <div id="bill-items"></div>
            <div style="text-align:right; font-weight:bold; border-top:1px solid #ccc; margin-top:10px; padding-top:10px;">
                CELKEM: <span id="bill-total">0</span> Kč
            </div>
        </div>
        <button class="btn btn-pay" onclick="payFull()">ZAPLATIT VŠE ✅</button>
        <button class="btn btn-split" onclick="openSplitModal()">DĚLIT ÚČET ✂️</button>
        <button class="btn btn-res" onclick="openResModal()">REZERVOVAT 📅</button>
        <button class="btn btn-back" onclick="showTables()">ZPĚT</button>
    </div>

    <div id="res-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Nová rezervace</h3>
            <label>Vyberte datum a čas:</label>
            <input type="datetime-local" id="res-time">
            <button class="btn btn-pay" onclick="saveReservation()">ULOŽIT REZERVACI</button>
            <button class="btn btn-back" onclick="closeModal('res-modal')">ZRUŠIT</button>
            <button class="btn" style="background:red;" onclick="cancelRes()">SMAZAT REZERVACI</button>
        </div>
    </div>

    <div id="split-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Vyberte položky k platbě</h3>
            <div id="split-list"></div>
            <hr>
            <div style="font-weight:bold; margin:10px 0;">K ÚHRADĚ: <span id="split-total">0</span> Kč</div>
            <button class="btn btn-pay" onclick="confirmSplitPay()">ZAPLATIT VYBRANÉ</button>
            <button class="btn btn-back" onclick="closeModal('split-modal')">ZPĚT</button>
        </div>
    </div>

    <script>
        const menu = [
            { id:1, name:"Pivo 12", price:55 }, { id:2, name:"Kofola", price:40 },
            { id:3, name:"Svíčková", price:255 }, { id:4, name:"Guláš", price:185 },
            { id:5, name:"Pizza", price:175 }, { id:6, name:"Espresso", price:45 }
        ];

        let tables = JSON.parse(localStorage.getItem('g_tables')) || Array.from({length: 12}, (_, i) => ({
            id: i+1, name: "Stůl "+(i+1), items: [], status: 'free', res: null
        }));
        let logs = JSON.parse(localStorage.getItem('g_logs')) || [];
        let activeTable = null;
        let selectedForSplit = [];

        function init() {
            const grid = document.getElementById('tables-grid');
            grid.innerHTML = '';
            tables.forEach(t => {
                const div = document.createElement('div');
                div.className = `table-box ${t.status}`;
                let total = t.items.reduce((s, i) => s + i.price, 0);
                let info = t.status === 'reserved' ? "Rezervace: "+new Date(t.res).toLocaleString([], {day:'numeric', month:'numeric', hour:'2-digit', minute:'2-digit'}) : (total > 0 ? total+" Kč" : "Volno");
                div.innerHTML = `<strong>${t.name}</strong><small>${info}</small>`;
                div.onclick = () => openOrder(t);
                grid.appendChild(div);
            });
            save();
        }

        function openOrder(t) {
            activeTable = t;
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('screen-order').classList.remove('hidden');
            document.getElementById('active-table-name').innerText = t.name;
            renderMenu();
            renderBill();
        }

        function renderMenu() {
            const box = document.getElementById('menu-box');
            box.innerHTML = menu.map(m => `<button class="m-item" onclick="addItem(${m.id})">${m.name}<br>${m.price} Kč</button>`).join('');
        }

        function addItem(id) {
            const item = menu.find(x => x.id === id);
            activeTable.items.push({...item, tempId: Math.random()});
            activeTable.status = 'occupied';
            renderBill();
            save();
        }

        function renderBill() {
            const list = document.getElementById('bill-items');
            let total = 0;
            list.innerHTML = activeTable.items.map(i => {
                total += i.price;
                return `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${i.name}</span><b>${i.price} Kč</b></div>`;
            }).join('');
            document.getElementById('bill-total').innerText = total;
        }

        // --- DĚLENÍ ÚČTU LOGIKA ---
        function openSplitModal() {
            if(activeTable.items.length === 0) return;
            selectedForSplit = [];
            document.getElementById('split-modal').classList.remove('hidden');
            renderSplitList();
        }

        function renderSplitList() {
            const list = document.getElementById('split-list');
            list.innerHTML = activeTable.items.map((item, idx) => {
                const isSelected = selectedForSplit.includes(idx);
                return `<div class="split-item ${isSelected ? 'selected' : ''}" onclick="toggleSplitItem(${idx})">
                    <span>${item.name}</span><span>${item.price} Kč</span>
                </div>`;
            }).join('');
            calculateSplitTotal();
        }

        function toggleSplitItem(idx) {
            if(selectedForSplit.includes(idx)) {
                selectedForSplit = selectedForSplit.filter(i => i !== idx);
            } else {
                selectedForSplit.push(idx);
            }
            renderSplitList();
        }

        function calculateSplitTotal() {
            let total = 0;
            selectedForSplit.forEach(idx => total += activeTable.items[idx].price);
            document.getElementById('split-total').innerText = total;
        }

        function confirmSplitPay() {
            if(selectedForSplit.length === 0) return;
            let paidSum = 0;
            // Odstranění položek z účtu stolu
            const remainingItems = [];
            activeTable.items.forEach((item, idx) => {
                if(selectedForSplit.includes(idx)) {
                    paidSum += item.price;
                    logs.push({ price: item.price, date: new Date().toISOString() });
                } else {
                    remainingItems.push(item);
                }
            });
            activeTable.items = remainingItems;
            if(activeTable.items.length === 0) activeTable.status = 'free';
            
            closeModal('split-modal');
            save();
            renderBill();
            alert("Zaplaceno: " + paidSum + " Kč");
        }

        // --- REZERVACE LOGIKA ---
        function openResModal() {
            document.getElementById('res-modal').classList.remove('hidden');
        }

        function saveReservation() {
            const time = document.getElementById('res-time').value;
            if(!time) return alert("Vyberte čas!");
            activeTable.status = 'reserved';
            activeTable.res = time;
            closeModal('res-modal');
            showTables();
        }

        function cancelRes() {
            activeTable.status = 'free';
            activeTable.res = null;
            closeModal('res-modal');
            showTables();
        }

        // --- UNIVERZÁLNÍ ---
        function payFull() {
            const total = activeTable.items.reduce((s, i) => s + i.price, 0);
            if(total > 0) logs.push({ price: total, date: new Date().toISOString() });
            activeTable.items = [];
            activeTable.status = 'free';
            activeTable.res = null;
            showTables();
        }

        function showTables() {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('screen-tables').classList.remove('hidden');
            init();
        }

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function save() { 
            localStorage.setItem('g_tables', JSON.stringify(tables));
            localStorage.setItem('g_logs', JSON.stringify(logs));
        }

        window.onload = init;
    </script>
</body>
</html>
