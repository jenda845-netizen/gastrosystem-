<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gastro ERP Ultimate Pro</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div id="user-info">👤 <span>Profi Obsluha</span></div>
            <h1 onclick="showTables()">GASTRO PRO 2026</h1>
            <div class="header-btns">
                <button class="btn-admin-nav" onclick="showAdmin()">📊 ADMIN & DASHBOARD</button>
            </div>
        </header>

        <div id="screen-tables" class="screen">
            <div class="top-stats">
                <span>Dnešní tržba: <b id="stat-revenue">0</b> Kč</span>
            </div>
            <div id="tables-grid"></div>
        </div>

        <div id="screen-order" class="screen hidden">
            <div class="order-layout">
                <div class="menu-side">
                    <div id="menu-items" class="menu-grid"></div>
                </div>
                <div class="bill-side">
                    <div class="bill-header">
                        <h2 id="active-table-title">Stůl</h2>
                        <button class="back-x" onclick="showTables()">✕</button>
                    </div>
                    <div id="bill-list" class="bill-items"></div>
                    <div class="bill-footer">
                        <div class="total-row">CELKEM: <span id="bill-total">0</span> Kč</div>
                        <div class="btn-group">
                            <button class="btn-qr" onclick="openQR()">📱 QR PLATBA</button>
                            <button class="btn-pay" onclick="completePayment('cash')">HOTOVĚ ✅</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="screen-admin" class="screen hidden">
            <div class="admin-tabs">
                <button onclick="renderDashboard()">📈 DASHBOARD</button
