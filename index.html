<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS S23+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: sans-serif; }
        @media print {
            body * { visibility: hidden; }
            #print-section, #print-section * { visibility: visible; }
            #print-section { position: absolute; left: 0; top: 0; width: 58mm; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="app" class="max-w-md mx-auto bg-white min-h-screen flex flex-col shadow-lg">
        <header class="bg-slate-900 text-white p-5 flex justify-between items-center">
            <h1 class="font-black text-xl tracking-tighter uppercase">Gastro POS</h1>
            <span class="text-[10px] bg-blue-500 px-2 py-1 rounded">S23+ MODE</span>
        </header>

        <div id="section-tables" class="p-4 grid grid-cols-4 gap-2">
            </div>

        <div id="section-pos" class="hidden flex-1 p-4 flex flex-col bg-white">
            <button onclick="location.reload()" class="text-xs font-bold text-gray-400 mb-4 uppercase">← Zpět na stoly</button>
            <h2 id="label-table" class="text-2xl font-black mb-4">STŮL</h2>
            <div id="menu-grid" class="grid grid-cols-2 gap-3 mb-6"></div>
            <div id="cart-list" class="flex-1 border-t pt-4 space-y-2 text-sm italic"></div>
            
            <div class="border-t-2 border-black pt-4 mt-4">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold">CELKEM</span>
                    <span class="text-3xl font-black" id="total-price">0</span>
                </div>
                <button onclick="printReceipt()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">
                    ZAPLATIT & TISKNOUT
                </button>
            </div>
        </div>
    </div>

    <div id="print-section" class="hidden text-black p-2 font-mono text-sm leading-tight">
        <center>
            <b style="font-size: 1.2em;">MOJE RESTAURACE</b><br>
            --------------------------------<br>
            STŮL: <span id="p-table"></span><br>
            <span id="p-time"></span><br>
            --------------------------------<br>
        </center>
        <div id="p-items"></div>
        --------------------------------<br>
        <center>
            <b style="font-size: 1.4em;">CELKEM: <span id="p-total"></span> Kč</b><br>
            --------------------------------<br>
            Děkujeme za návštěvu!
        </center>
    </div>

    <script>
        const menu = [
            { name: "Pivo 11°", price: 45 }, { name: "Pivo 12°", price: 52 },
            { name: "Kofola", price: 38 }, { name: "Smažák", price: 185 },
            { name: "Guláš", price: 175 }, { name: "Espresso", price: 48 }
        ];
        let cart = [];
        let table = 0;

        // Stoly
        const tg = document.getElementById('section-tables');
        for(let i=1; i<=12; i++) {
            tg.innerHTML += `<div onclick="openT(${i})" class="bg-white border h-14 flex items-center justify-center rounded-xl font-bold shadow-sm active:bg-blue-600 active:text-white">${i}</div>`;
        }

        // Menu
        const mg = document.getElementById('menu-grid');
        menu.forEach(i => {
            mg.innerHTML += `<div onclick="add('${i.name}', ${i.price})" class="bg-gray-50 p-4 rounded-xl border text-center active:scale-95 transition-all"><div class="text-[10px] uppercase font-bold text-gray-400">${i.name}</div><div class="font-black">${i.price} Kč</div></div>`;
        });

        function openT(n) {
            table = n;
            document.getElementById('label-table').innerText = "STŮL " + n;
            document.getElementById('section-tables').classList.add('hidden');
            document.getElementById('section-pos').classList.remove('hidden');
        }

        function add(n, p) {
            cart.push({n, p});
            draw();
        }

        function draw() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map(i => `<div class="flex justify-between"><span>${i.n}</span><b>${i.p} Kč</b></div>`).join('');
            document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.p, 0);
        }

        function printReceipt() {
            if(cart.length === 0) return;
            
            // Naplnění tiskové šablony
            document.getElementById('p-table').innerText = table;
            document.getElementById('p-time').innerText = new Date().toLocaleString('cs-CZ');
            document.getElementById('p-total').innerText = document.getElementById('total-price').innerText;
            document.getElementById('p-items').innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between;"><span>${i.n}</span><span>${i.p} Kč</span></div>`).join('');
            
            // Spuštění systémového tisku
            window.print();
        }
    </script>
</body>
</html>
