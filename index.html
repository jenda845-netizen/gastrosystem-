<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POKLADNA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-xs mx-auto bg-white p-6 shadow-xl rounded-3xl">
        <h1 class="text-center font-black text-2xl mb-6 tracking-tighter">GASTRO POS</h1>
        
        <div class="grid grid-cols-1 gap-3 mb-8">
            <button onclick="add('PIVO', 45)" class="bg-blue-600 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all shadow-md">PIVO 45,-</button>
            <button onclick="add('SMAZAK', 185)" class="bg-blue-600 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all shadow-md">SMAŽÁK 185,-</button>
            <button onclick="add('KAVA', 48)" class="bg-blue-600 text-white py-4 rounded-2xl font-bold active:scale-95 transition-all shadow-md">KÁVA 48,-</button>
        </div>

        <div id="kosik" class="border-t-2 border-dashed border-gray-200 pt-4 font-mono text-sm mb-4 min-h-[100px]">
            </div>

        <div class="text-2xl font-black text-right mb-8 border-t-2 pt-2">
            CELKEM: <span id="total">0</span> Kč
        </div>

        <button onclick="tiskni()" class="w-full bg-black text-white py-6 rounded-2xl font-black text-xl shadow-lg active:bg-gray-800 transition-all uppercase tracking-widest">
            Vytisknout
        </button>
    </div>

    <script>
        let items = [];

        function add(n, p) {
            items.push({n, p});
            updateUI();
        }

        function updateUI() {
            const kosik = document.getElementById('kosik');
            kosik.innerHTML = items.map(i => `<div class="flex justify-between"><span>${i.n}</span><span>${i.p},-</span></div>`).join('');
            document.getElementById('total').innerText = items.reduce((s, i) => s + i.p, 0);
        }

        function tiskni() {
            if(items.length === 0) return;
            const suma = document.getElementById('total').innerText;
            
            // ČISTÝ TEXT PRO TISKÁRNU (bez formátování a diakritiky)
            let txt = "\n";
            txt += "      RESTAURACE\n";
            txt += "------------------------\n";
            items.forEach(i => {
                txt += i.n.padEnd(15) + i.p.toString().padStart(4) + " Kc\n";
            });
            txt += "------------------------\n";
            txt += "CELKEM: " + suma + " Kc\n";
            txt += "\n\n\n\n"; // Důležité: volné řádky, aby šla účtenka utrhnout

            // ODESLÁNÍ DO RawBT (nejstabilnější cesta)
            // Použijeme prostý text kódovaný do Base64
            const b64 = btoa(txt);
            window.location.href = "intent:#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;S.base64=" + b64 + ";end;";
        }
    </script>
</body>
</html>
