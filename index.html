<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GASTRO PRO 2026 - ADVANCED STOCK</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --success: #22c55e; --warn: #f59e0b; --danger: #ef4444; --text: #f8fafc; }
        body { font-family: sans-serif; margin: 0; background: var(--bg); color: var(--text); user-select: none; overflow-x: hidden; }
        header { background: var(--card); padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #334155; position: sticky; top: 0; z-index: 50; }
        .screen { padding: 15px; }
        .hidden { display: none !important; }
        
        /* Mapa stolů */
        #tables-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .table-box { height: 95px; background: var(--card); border-radius: 12px; border: 2px solid #475569; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .table-box.occupied { border-color: var(--danger); background: #450a0a; }

        /* Skladové karty */
        .stock-section { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
        .stock-section h3 { margin-top: 0; color: var(--accent); border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .stock-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .stock-table td { padding: 8px; border-bottom: 1px solid #1e293b; }
        .sub-badge { background: #6366f1; font-size: 10px; padding: 2px 5px; border-radius: 4px; }

        /* Tlačítka a Menu */
        .btn { padding: 15px; border: none; border-radius: 10px; font-weight: bold; color: white; width: 100%; margin-top: 10px; cursor: pointer; }
        .btn-pay { background: var(--success); }
        .btn-back { background: #475569; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .m-item { background: var(--card); color: white; border: 1px solid #475569; padding: 15px; border-radius: 10px; font-weight: bold; }
        
        .bill-area { background: white; color: black; padding: 12px; border-radius: 10px; margin: 10px 0; }
    </style>
</head>
<body>

    <header>
        <h1 onclick="location.reload()">GASTRO PRO</h1>
        <div style="display:flex; gap:5px;">
            <button onclick="showAdmin()" style="background:#475569; color:white; border:none; padding:8px 12px; border-radius:8px;">📦 SKLAD</button>
        </div>
    </header>

    <div id="screen-tables" class="screen">
        <div id="tables-grid"></div>
    </div>

    <div id="screen-order" class="screen hidden">
        <h2 id="active-table-name">Stůl</h2>
        <div class="menu-grid" id="menu-box"></div>
        <div class="bill-area">
            <div id="bill-items"></div>
            <div style="text-align:right; font-weight:bold; border-top:1px solid #ccc; margin-top:10px; padding-top:10px;">
                CELKEM: <span id="bill-total">0</span> Kč
            </div>
        </div>
        <button class="btn btn-pay" onclick="payFull()">ZAPLATIT A ODSEKAT SKLAD ✅</button>
        <button class="btn btn-back" onclick="showTables()">ZPĚT</button>
    </div>

    <div id="screen-admin" class="screen hidden">
        <h2>Správa skladu a Receptur</h2>
        
        <div id="stock-kuchyn" class="stock-section">
            <h3>👨‍🍳 Kuchyň (Suroviny & Podreceptury)</h3>
            <table class="stock-table"><tbody id="body-kuchyn"></tbody></table>
        </div>

        <div id="stock-bar" class="stock-section">
            <h3>🍺 Bar (Nápoje & Ingredience)</h3>
            <table class="stock-table"><tbody id="body-bar"></tbody></table>
        </div>

        <button class="btn btn-back" onclick="showTables()">ZPĚT NA STOLY</button>
    </div>

    <script>
        // --- DATA SKLADU (Rozděleno) ---
        let stock = JSON.parse(localStorage.getItem('g_stock_v2')) || {
            kuchyn: {
                "Hovězí maso": { qty: 10000, unit: "g" },
                "Mouka": { qty: 20000, unit: "g" },
                "Vejce": { qty: 100, unit: "ks" },
                "Mléko": { qty: 10000, unit: "ml" },
                "Knedlík (polotovar)": { qty: 20, unit: "ks", isSub: true, recipe: { "Mouka": 200, "Vejce": 0.5, "Mléko": 100 } }
            },
            bar: {
                "Pivo Sud": { qty: 50000, unit: "ml" },
                "Kofola Sud": { qty: 30000, unit: "ml" },
                "Káva zrnková": { qty: 2000, unit: "g" },
                "Rum": { qty: 5000, unit: "ml" }
            }
        };

        // --- MENU S RECEPTUROU A PODRECEPTUROU ---
        const menuItems = [
            { id:1, name:"Pivo 12", price:55, cat:"bar", recipe: { "Pivo Sud": 500 } },
            { id:2, name:"Espresso", price:45, cat:"bar", recipe: { "Káva zrnková": 8 } },
            { id:3, name:"Svíčková", price:265, cat:"kuchyn", recipe: { "Hovězí maso": 150, "Knedlík (polotovar)": 4 } },
            { id:4, name:"Grog", price:65, cat:"bar", recipe: { "Rum": 40 } }
        ];

        let tables = JSON.parse(localStorage.getItem('g_tables')) || Array.from({length: 9}, (_, i) => ({
            id: i+1, name: "Stůl "+(i+1), items: [], status: 'free'
        }));
        let logs = JSON.parse(localStorage.getItem('g_logs')) || [];
        let activeTable = null;

        function init() {
            const grid = document.getElementById('tables-grid');
            grid.innerHTML = '';
            tables.forEach(t => {
                const div = document.createElement('div');
                div.className = `table-box ${t.items.length > 0 ? 'occupied' : ''}`;
                let total = t.items.reduce((s, i) => s + i.price, 0);
                div.innerHTML = `<strong>${t.name}</strong><small>${total > 0 ? total+" Kč" : "Volno"}</small>`;
                div.onclick = () => openOrder(t);
                grid.appendChild(div);
            });
            save();
        }

        function openOrder(t) {
            activeTable = t;
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('screen-order').classList.remove('hidden');
            document.getElementById('active-table-name').innerText = t.name;
            renderMenu();
            renderBill();
        }

        function renderMenu() {
            const box = document.getElementById('menu-box');
            box.innerHTML = menuItems.map(m => `<button class="m-item" onclick="addItem(${m.id})">${m.name}<br>${m.price} Kč</button>`).join('');
        }

        function addItem(id) {
            const item = menuItems.find(x => x.id === id);
            activeTable.items.push({...item});
            renderBill();
            save();
        }

        function renderBill() {
            const list = document.getElementById('bill-items');
            let total = 0;
            list.innerHTML = activeTable.items.map(i => {
                total += i.price;
                return `<div style="display:flex; justify-content:space-between; color:black; padding:5px 0; border-bottom:1px solid #eee;"><span>${i.name}</span><b>${i.price} Kč</b></div>`;
            }).join('');
            document.getElementById('bill-total').innerText = total;
        }

        // --- HLAVNÍ LOGIKA ODPISU (Včetně podreceptur) ---
        function deductFromStock(recipe, section) {
            for (let ingredient in recipe) {
                let amountToDeduct = recipe[ingredient];
                
                // Najdeme kde surovina leží
                let targetSection = stock.kuchyn[ingredient] ? "kuchyn" : "bar";
                let item = stock[targetSection][ingredient];

                if (item) {
                    item.qty -= amountToDeduct;
                    // Pokud je to podreceptura, odepíšeme její složení
                    if (item.isSub && item.recipe) {
                        deductFromStock(item.recipe, targetSection);
                    }
                }
            }
        }

        function payFull() {
            activeTable.items.forEach(item => {
                if (item.recipe) {
                    deductFromStock(item.recipe);
                }
                logs.push({ price: item.price, date: new Date().toISOString() });
            });
            activeTable.items = [];
            showTables();
        }

        // --- ADMIN SKLAD RENDER ---
        function showAdmin() {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('screen-admin').classList.remove('hidden');
            
            const renderSection = (data, elementId) => {
                const body = document.getElementById(elementId);
                body.innerHTML = '';
                for (let key in data) {
                    const it = data[key];
                    body.innerHTML += `<tr>
                        <td>${key} ${it.isSub ? '<span class="sub-badge">POD-REC</span>' : ''}</td>
                        <td style="text-align:right; font-weight:bold; color:${it.qty < 500 ? 'red' : 'inherit'}">${it.qty}</td>
                        <td>${it.unit}</td>
                    </tr>`;
                }
            };

            renderSection(stock.kuchyn, "body-kuchyn");
            renderSection(stock.bar, "body-bar");
        }

        function showTables() {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('screen-tables').classList.remove('hidden');
            init();
        }

        function save() {
            localStorage.setItem('g_tables', JSON.stringify(tables));
            localStorage.setItem('g_logs', JSON.stringify(logs));
            localStorage.setItem('g_stock_v2', JSON.stringify(stock));
        }

        window.onload = init;
    </script>
</body>
</html>
