<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS OBRÁZEK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="app" class="max-w-md mx-auto bg-white min-h-screen flex flex-col shadow-lg">
        <header class="bg-slate-900 text-white p-5 flex justify-between items-center">
            <h1 class="font-black text-xl uppercase tracking-tighter">Gastro POS</h1>
            <span class="text-[10px] bg-red-600 px-2 py-1 rounded font-bold italic text-white">IMAGE MODE</span>
        </header>

        <div id="section-tables" class="p-4 grid grid-cols-4 gap-2"></div>

        <div id="section-pos" class="hidden flex-1 p-4 flex flex-col bg-white">
            <button onclick="location.reload()" class="text-xs font-bold text-gray-400 mb-4 uppercase">← ZPĚT</button>
            <div id="menu-grid" class="grid grid-cols-2 gap-3 mb-6"></div>
            <div id="cart-list" class="flex-1 border-t pt-4 space-y-2 text-sm italic font-bold"></div>
            
            <div class="border-t-2 border-black pt-4 mt-4">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold uppercase text-xs">Celkem</span>
                    <span class="text-3xl font-black"><span id="total-price">0</span> Kč</span>
                </div>
                <button onclick="generateAndPrint()" class="w-full bg-blue-600 text-white py-6 rounded-2xl font-black text-xl shadow-xl active:scale-95 transition-all">
                    VYTISKNOUT ÚČTENKU
                </button>
            </div>
        </div>
    </div>

    <div style="position: absolute; left: -9999px;">
        <div id="receipt-capture" style="width: 380px; background: white; padding: 20px; color: black; font-family: Arial, sans-serif;">
            <center>
                <h1 style="font-size: 28px; margin: 0;">MOJE RESTAURACE</h1>
                <p style="border-bottom: 2px solid black; padding-bottom: 10px;">
                    STŮL: <span id="r-table"></span><br>
                    <span id="r-time"></span>
                </p>
            </center>
            <div id="r-items" style="font-size: 20px; line-height: 1.5;"></div>
            <p style="border-top: 2px solid black; padding-top: 10px; font-size: 26px; font-weight: bold; display: flex; justify-content: space-between;">
                <span>CELKEM</span>
                <span><span id="r-total">0</span> Kč</span>
            </p>
            <center><p style="font-size: 16px; margin-top: 20px;">Děkujeme za návštěvu!</p></center>
        </div>
    </div>

    <script>
        const menu = [
            { n: "Pivo 11", p: 45 }, { n: "Pivo 12", p: 52 },
            { n: "Kofola", p: 38 }, { n: "Smažák", p: 185 },
            { n: "Guláš", p: 175 }, { n: "Espresso", p: 48 }
        ];
        let cart = [];
        let tableNum = 0;

        // Generování stolů
        const tg = document.getElementById('section-tables');
        for(let i=1; i<=12; i++) {
            tg.innerHTML += `<div onclick="openT(${i})" class="bg-white border h-14 flex items-center justify-center rounded-xl font-bold shadow-sm active:bg-blue-600 active:text-white transition-colors">${i}</div>`;
        }

        // Generování menu
        const mg = document.getElementById('menu-grid');
        menu.forEach(i => {
            mg.innerHTML += `<div onclick="add('${i.n}', ${i.p})" class="bg-gray-50 p-4 rounded-xl border text-center active:scale-95"><div class="text-[10px] uppercase font-bold text-gray-400">${i.n}</div><div class="font-black">${i.p} Kč</div></div>`;
        });

        function openT(n) {
            tableNum = n;
            document.getElementById('section-tables').classList.add('hidden');
            document.getElementById('section-pos').classList.remove('hidden');
        }

        function add(n, p) {
            cart.push({n, p});
            document.getElementById('cart-list').innerHTML = cart.map(i => `<div class="flex justify-between"><span>${i.n}</span><b>${i.p} Kč</b></div>`).join('');
            document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.p, 0);
        }

        async function generateAndPrint() {
            if(cart.length === 0) return;
            
            // 1. Naplnit data
            document.getElementById('r-table').innerText = tableNum;
            document.getElementById('r-time').innerText = new Date().toLocaleString('cs-CZ');
            document.getElementById('r-total').innerText = document.getElementById('total-price').innerText;
            document.getElementById('r-items').innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between;"><span>${i.n}</span><span>${i.p} Kč</span></div>`).join('');

            // 2. Vyfotit účtenku (převod na obrázek)
            const capture = document.getElementById('receipt-capture');
            const canvas = await html2canvas(capture);
            const dataUrl = canvas.toDataURL("image/png");
            const base64Image = dataUrl.split(',')[1];

            // 3. Poslat do RawBT jako obrázek (intent)
            window.location.href = "intent:#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;S.base64=" + base64Image + ";end;";
        }
    </script>
</body>
</html>
