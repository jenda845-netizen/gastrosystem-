<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastro POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl p-6 mt-10">
        <h1 class="text-3xl font-black text-blue-600 text-center mb-8">POS SYSTÉM</h1>
        
        <div class="space-y-4">
            <div class="flex justify-between items-center p-4 bg-gray-50 rounded-lg">
                <span class="font-bold text-lg">Pivo Kozel 11</span>
                <span class="text-blue-600 font-bold">45 Kč</span>
            </div>
        </div>

        <button id="printBtn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-transform mt-10">
            TISKNOUT TEST (MPT-II)
        </button>
        
        <p id="status" class="text-center text-xs mt-4 text-gray-400 text-uppercase tracking-widest">Připraveno k tisku</p>
    </div>

    <script>
        document.getElementById('printBtn').addEventListener('click', async () => {
            const status = document.getElementById('status');
            try {
                status.innerText = "HLEDÁM TISKÁRNU...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'MPT' }, { namePrefix: 'Bluetooth' }],
                    optionalServices: [0xFF00]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(0xFF00);
                const char = await service.getCharacteristic(0xFF01);
                
                // Jednoduchý ESC/POS příkaz pro tisk
                const encoder = new TextEncoder();
                const data = encoder.encode("\x1B\x40\x1B\x61\x01\nTEST TISKU OK\nS23 PLUS CONNECTED\n\n\n\n\n");
                
                await char.writeValue(data);
                status.innerText = "VYTIŠTĚNO! ✅";
            } catch (e) {
                console.error(e);
                status.innerText = "CHYBA: " + e.message;
            }
        });
    </script>
</body>
</html>
