<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastro POS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Styl pro tiskárnu - černé na bílém, bez zbytečností */
        @media print {
            body * { visibility: hidden; }
            #receipt { 
                visibility: visible; 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 100%;
                color: black !important;
                background: white !important;
                font-family: 'Courier New', Courier, monospace;
            }
            .no-print { display: none; }
        }
    </style>
</head>
<body class="bg-gray-100">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg no-print">
        <header class="bg-black text-white p-6 text-center">
            <h1 class="text-2xl font-bold tracking-tighter">MOJE POKLADNA</h1>
        </header>

        <div id="tables" class="p-4 grid grid-cols-4 gap-2">
            </div>

        <div id="pos" class="hidden p-4 flex flex-col min-h-[80vh]">
            <button onclick="location.reload()" class="mb-4 text-gray-400 font-bold uppercase text-xs">← Zpět na stoly</button>
            <h2 id="table-label" class="text-3xl font-black mb-6">STŮL</h2>
            
            <div id="menu" class="grid grid-cols-2 gap-2 mb-8">
                </div>

            <div id="cart" class="flex-1 border-t pt-4 text-sm font-mono mb-4">
                </div>

            <div class="border-t-4 border-black pt-4">
                <div class="flex justify-between text-2xl font-black mb-6">
                    <span>CELKEM</span>
                    <span><span id="total">0</span> Kč</span>
                </div>
                <button onclick="doPrint()" class="w-full bg-blue-700 text-white py-6 rounded-2xl font-black text-xl shadow-2xl active:bg-blue-800">
                    VYDANÁ ÚČTENKA
                </button>
            </div>
        </div>
    </div>

    <div id="receipt" class="p-2 text-black" style="width: 58mm; font-size: 12px; line-height: 1.2;">
        <div style="text-align: center; font-weight: bold; font-size: 16px; margin-bottom: 5px;">MOJE RESTAURACE</div>
        <div style="text-align: center; border-bottom: 1px dashed black; padding-bottom: 5px; margin-bottom: 5px;">
            STŮL: <span id="r-table"></span><br>
            <span id="r-time"></span>
        </div>
        <div id="r-items" style="margin-bottom: 5px;"></div>
        <div style="border-top: 1px dashed black; padding-top: 5px; font-weight: bold; display: flex; justify-content: space-between; font-size: 14px;">
            <span>CELKEM</span>
            <span><span id="r-total">0</span> Kč</span>
        </div>
        <div style="text-align: center; margin-top: 10px; font-size: 10px;">DĚKUJEME ZA NÁVŠTĚVU!</div>
    </div>

    <script>
        const menu = [
            { n: "Pivo 11", p: 45 }, { n: "Pivo 12", p: 52 },
            { n: "Kofola 0.5", p: 38 }, { n: "Smažák", p: 185 },
            { n: "Guláš", p: 175 }, { n: "Espresso", p: 48 }
        ];
        let items = [];
        let activeT = 0;

        // Stoly
        const tDiv = document.getElementById('tables');
        for(let i=1; i<=12; i++) {
            tDiv.innerHTML += `<button onclick="startT(${i})" class="bg-white border-2 h-16 rounded-xl font-bold text-xl active:bg-black active:text-white">${i}</button>`;
        }

        // Menu
        const mDiv = document.getElementById('menu');
        menu.forEach(m => {
            mDiv.innerHTML += `<button onclick="add('${m.n}', ${m.p})" class="bg-gray-50 border p-4 rounded-xl text-center active:scale-95"><div class="text-[10px] font-bold text-gray-400 uppercase">${m.n}</div><div class="font-black">${m.p} Kč</div></button>`;
        });

        function startT(n) {
            activeT = n;
            document.getElementById('table-label').innerText = "STŮL " + n;
            document.getElementById('tables').classList.add('hidden');
            document.getElementById('pos').classList.remove('hidden');
        }

        function add(n, p) {
            items.push({n, p});
            document.getElementById('cart').innerHTML = items.map(i => `<div class="flex justify-between border-b pb-1"><span>${i.n}</span><b>${i.p} Kč</b></div>`).join('');
            document.getElementById('total').innerText = items.reduce((s, i) => s + i.p, 0);
        }

        function doPrint() {
            if(items.length === 0) return;
            
            // Naplnění tiskové šablony
            document.getElementById('r-table').innerText = activeT;
            document.getElementById('r-time').innerText = new Date().toLocaleString('cs-CZ');
            document.getElementById('r-total').innerText = document.getElementById('total').innerText;
            document.getElementById('r-items').innerHTML = items.map(i => `<div style="display:flex; justify-content:space-between;"><span>${i.n}</span><span>${i.p} Kč</span></div>`).join('');
            
            // Spustí tiskový dialog
            window.print();
        }
    </script>
</body>
</html>
